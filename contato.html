<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
        <ul class="navbar-nav gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
          <li class="nav-item"><a class="nav-link" href="conteudos.html">Conteúdos</a></li>
          <li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="page-header text-center">
    <div class="container">
      <h1>Entre em <span>Contato</span></h1>
      <p>Preencha o formulário abaixo para enviar uma mensagem.</p>
    </div>
  </section>

  <section class="section" style="padding-top: 1rem;">
    <div class="container" style="max-width: 600px;">
      <div class="form-wrapper">

        <form id="contactForm" novalidate>
          <div class="mb-3">
            <label for="inputNome" class="form-label-custom">Nome</label>
            <input type="text" class="form-control form-control-custom" id="inputNome" placeholder="Seu nome">
            <div class="form-error" id="nomeError">
              <i class="bi bi-exclamation-circle me-1"></i> Insira um nome com pelo menos 3 caracteres.
            </div>
          </div>

          <div class="mb-3">
            <label for="inputEmail" class="form-label-custom">E-mail</label>
            <input type="email" class="form-control form-control-custom" id="inputEmail" placeholder="seu@email.com">
            <div class="form-error" id="emailError">
              <i class="bi bi-exclamation-circle me-1"></i> Insira um e-mail válido.
            </div>
          </div>

          <div class="mb-3">
            <label for="inputMensagem" class="form-label-custom">Mensagem</label>
            <textarea class="form-control form-control-custom" id="inputMensagem" rows="4"
              placeholder="Sua mensagem..."></textarea>
            <div class="form-error" id="mensagemError">
              <i class="bi bi-exclamation-circle me-1"></i> A mensagem deve ter pelo menos 10 caracteres.
            </div>
          </div>

          <button type="submit" class="btn btn-primary-custom w-100">
            <i class="bi bi-send me-1"></i> Enviar
          </button>
        </form>

        <div class="form-success" id="formSuccess">
          <i class="bi bi-check-circle-fill" style="font-size: 1.5rem; display: block; margin-bottom: 0.5rem;"></i>
          Mensagem enviada com sucesso!
        </div>

      </div>
    </div>
  </section>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
